name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy public bundle to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "public/*"
          target: "/opt/services/nginx/html/dotsai.in/"
          strip_components: 1

      - name: Deploy Nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/nginx/default.conf"
          target: "/opt/services/nginx/conf.d/"
          strip_components: 2

      - name: Validate and reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker exec nginx nginx -t
            docker exec nginx nginx -s reload
            echo "✅ dotsai.in deployed at $(date)"

      - name: Run release gate
        id: release_gate
        continue-on-error: true
        run: ./scripts/release_gate.sh dotsai.in zeroonedotsai.consulting

      - name: Publish monitor snapshot
        if: always()
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "public/monitor-data/*"
          target: "/opt/services/nginx/html/dotsai.in/monitor-data/"
          strip_components: 2

      - name: Enforce release gate
        if: always() && steps.release_gate.outcome == 'failure'
        run: exit 1
