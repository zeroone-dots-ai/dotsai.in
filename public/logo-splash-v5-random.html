<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroOne D.O.T.S AI — Logo Splash v5 · Random</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

  #splash {
    position: fixed; inset: 0;
    background: #06060a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 32px;
  }

  /* ── Galaxy canvas (v4) ── */
  #galaxy { position: absolute; inset: 0; z-index: 1; display: none; }

  /* ── Scan line (v3) ── */
  #scanline {
    position: absolute;
    width: 2px; height: 100%;
    background: linear-gradient(180deg, transparent 0%, rgba(200,182,255,0.6) 50%, transparent 100%);
    left: -10px; top: 0;
    pointer-events: none;
    opacity: 0; z-index: 10;
    box-shadow: 0 0 20px 4px rgba(200,182,255,0.3);
    display: none;
  }

  /* ── Glow bg (v3) ── */
  .glow-bg {
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(67,48,95,0.5) 0%, transparent 70%);
    pointer-events: none; opacity: 0; z-index: 1;
    display: none;
  }

  /* ── Orbit rings (v2) ── */
  .orbit-ring {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(200,182,255,0.0);
    pointer-events: none; display: none;
  }
  .ring-1 { width: 120px; height: 120px; }
  .ring-2 { width: 180px; height: 180px; }

  /* ── Corner brackets (v3) ── */
  .bracket { position: absolute; width: 16px; height: 16px; opacity: 0; display: none; }
  .bracket.tl { top: -8px; left: -8px;
    border-top: 1px solid rgba(200,182,255,0.4);
    border-left: 1px solid rgba(200,182,255,0.4); }
  .bracket.tr { top: -8px; right: -8px;
    border-top: 1px solid rgba(200,182,255,0.4);
    border-right: 1px solid rgba(200,182,255,0.4); }
  .bracket.bl { bottom: -8px; left: -8px;
    border-bottom: 1px solid rgba(200,182,255,0.4);
    border-left: 1px solid rgba(200,182,255,0.4); }
  .bracket.br { bottom: -8px; right: -8px;
    border-bottom: 1px solid rgba(200,182,255,0.4);
    border-right: 1px solid rgba(200,182,255,0.4); }

  /* ── Divider (v3) ── */
  .divider {
    width: 0px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    display: none;
  }

  /* ── Content wrapper ── */
  .content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 32px; }

  /* ── v3 uses logo-wrap ── */
  .logo-wrap {
    display: flex; flex-direction: column;
    align-items: center; gap: 28px;
    position: relative; z-index: 2;
  }

  /* ── Dot grid ── */
  .dot-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    opacity: 0; transform: scale(0);
    position: relative;
  }
  .dot.ghost { background: rgba(255,255,255,0.07); }
  .dot[data-key="D"] { background: #C8B6FF; }
  .dot[data-key="O"] { background: #B8E0D2; }
  .dot[data-key="T"] { background: #FFCDB2; }

  /* Ripple ring on colored dots (v4) */
  .dot::after {
    content: '';
    position: absolute; inset: -6px;
    border-radius: 50%;
    border: 1px solid currentColor;
    opacity: 0; transform: scale(0.6);
  }
  .dot[data-key="D"]::after { color: #C8B6FF; }
  .dot[data-key="O"]::after { color: #B8E0D2; }
  .dot[data-key="T"]::after { color: #FFCDB2; }

  /* ── Wordmark ── */
  .wordmark {
    display: flex; flex-direction: column;
    align-items: center; gap: 7px;
    opacity: 0;
  }
  .brand-name {
    font-family: 'Space Mono', monospace;
    font-size: 22px; font-weight: 700;
    letter-spacing: 0.18em; color: #fff;
    opacity: 0; transform: scale(0.9);
    text-shadow: 0 0 40px rgba(200,182,255,0.4);
    overflow: hidden; white-space: nowrap;
  }

  /* v3 characters */
  .brand-name .char { display: inline-block; opacity: 0; transform: translateY(-10px); }

  .brand-sub {
    font-family: 'Space Mono', monospace;
    font-size: 16px; font-weight: 700;
    letter-spacing: 0.12em;
    display: flex; gap: 1px; align-items: baseline;
  }
  .brand-sub span { display: inline-block; opacity: 0; }
  .cd { color: #C8B6FF; } .co { color: #B8E0D2; }
  .ct { color: #FFCDB2; } .cs { color: #A2D2FF; }
  .csep { color: rgba(255,255,255,0.2); }
  .cai { color: rgba(255,255,255,0.9); margin-left: 10px; }

  .tagline {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    opacity: 0;
  }

  /* ── Version badge ── */
  #version-badge {
    position: fixed; bottom: 24px; left: 24px;
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 0.12em;
    color: rgba(255,255,255,0.15);
  }

  /* ── Replay button ── */
  #replay {
    position: fixed; bottom: 24px; right: 24px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.4);
    font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 0.1em;
    padding: 8px 16px; border-radius: 6px;
    cursor: pointer; opacity: 0;
    transition: background 0.2s;
  }
  #replay:hover { background: rgba(255,255,255,0.1); color: white; }

  /* Film grain overlay */
  #splash::after {
    content: '';
    position: absolute; inset: 0;
    pointer-events: none; opacity: 0.02;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&family=DM+Sans&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

<!-- v4 galaxy canvas -->
<canvas id="galaxy"></canvas>

<!-- v3 elements -->
<div id="scanline"></div>
<div class="glow-bg" id="glowBg"></div>

<div id="splash">
  <!-- v2 orbit rings -->
  <div class="orbit-ring ring-1" id="ring1"></div>
  <div class="orbit-ring ring-2" id="ring2"></div>

  <div class="content">
    <!-- v3 logo-wrap with brackets -->
    <div class="logo-wrap" id="logoWrap">
      <div class="bracket tl"></div>
      <div class="bracket tr"></div>
      <div class="bracket bl"></div>
      <div class="bracket br"></div>

      <div class="dot-grid" id="dotGrid">
        <div class="dot" data-key="D"></div>
        <div class="dot ghost"></div>
        <div class="dot ghost"></div>
        <div class="dot ghost"></div>
        <div class="dot" data-key="O"></div>
        <div class="dot ghost"></div>
        <div class="dot ghost"></div>
        <div class="dot ghost"></div>
        <div class="dot" data-key="T"></div>
      </div>

      <!-- v3 divider -->
      <div class="divider" id="divider"></div>

      <div class="wordmark" id="wordmark">
        <div class="brand-name" id="brandName">
          <!-- v3 uses individual chars; v1/v2/v4 use full text -->
          <span class="char">Z</span><span class="char">E</span><span class="char">R</span>
          <span class="char">O</span><span class="char">O</span><span class="char">N</span><span class="char">E</span>
        </div>
        <div class="brand-sub">
          <span class="cd">D</span><span class="csep">·</span>
          <span class="co">O</span><span class="csep">·</span>
          <span class="ct">T</span><span class="csep">·</span>
          <span class="cs">S</span>
          <span class="cai">AI</span>
        </div>
      </div>
    </div>

    <div class="tagline" id="tagline">Private AI · Built for You</div>
  </div>
</div>

<button id="replay">↺ REPLAY</button>
<div id="version-badge">v5 · RANDOM</div>

<script>
// ─────────────────────────────────────────────
//  SHARED REFERENCES
// ─────────────────────────────────────────────
const dotsAll = [...document.querySelectorAll('.dot')]
const D = dotsAll[0], O = dotsAll[4], T = dotsAll[8]
const ghosts = [dotsAll[1],dotsAll[2],dotsAll[3],dotsAll[5],dotsAll[6],dotsAll[7]]

const NAMES = ['SEQUENTIAL', 'ORBIT', 'SCAN', 'GALAXY BURST', 'CONSTELLATION', 'GLITCH BOOT']
let currentVersion = -1

// ─────────────────────────────────────────────
//  RESET — clears ALL state between replays
// ─────────────────────────────────────────────
function resetAll() {
  // Cancel any running particle loop
  if (galaxyAnimId) { cancelAnimationFrame(galaxyAnimId); galaxyAnimId = null }
  clearInterval(ambientInterval)
  galaxyParticles = []
  galaxyPhase = 'idle'

  // Kill all tweens
  gsap.killTweensOf('*')

  // Reset dots
  gsap.set(dotsAll, { opacity: 0, scale: 0, rotation: 0, x: 0, y: 0, filter: 'none', boxShadow: 'none', clearProps: 'boxShadow' })
  // Remove any canvas overlays left by v5/v6
  document.querySelectorAll('canvas:not(#galaxy)').forEach(el => el.remove())

  // Reset wordmark
  gsap.set('#wordmark', { opacity: 0, y: 0 })
  gsap.set('#brandName', { opacity: 0, scale: 0.9, y: 0, clipPath: 'none', width: 'auto' })
  gsap.set('.brand-sub span', { opacity: 0, y: 0 })
  gsap.set('#tagline', { opacity: 0 })
  gsap.set('#replay', { opacity: 0 })

  // Reset v3 elements
  gsap.set('#divider', { width: 0 })
  gsap.set('.bracket', { opacity: 0 })
  gsap.set('#glowBg', { opacity: 0 })
  gsap.set('#scanline', { left: -10, opacity: 0 })

  // Reset v2 rings
  gsap.set('#ring1,#ring2', { borderColor: 'rgba(200,182,255,0)', scale: 0.6, opacity: 0 })

  // Reset char spans for v3
  gsap.set('.char', { opacity: 0, y: -10 })

  // Hide version-specific elements
  document.getElementById('galaxy').style.display = 'none'
  document.getElementById('scanline').style.display = 'none'
  document.getElementById('glowBg').style.display = 'none'
  document.querySelectorAll('.orbit-ring').forEach(el => el.style.display = 'none')
  document.querySelectorAll('.bracket').forEach(el => el.style.display = 'none')
  document.getElementById('divider').style.display = 'none'

  // Clear canvas
  const canvas = document.getElementById('galaxy')
  const ctx = canvas.getContext('2d')
  ctx.clearRect(0, 0, canvas.width, canvas.height)
}

// ─────────────────────────────────────────────
//  VERSION 1 — SEQUENTIAL DOT REVEAL
// ─────────────────────────────────────────────
function runV1() {
  gsap.set('#brandName', { opacity: 0, scale: 0.9 })
  gsap.set(dotsAll, { scale: 0.4, opacity: 0 })

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } })

  tl.to(ghosts, { scale: 1, opacity: 1, duration: 0.5, stagger: 0.05, ease: 'back.out(1.2)' }, 0.1)

  tl.to(D, { scale: 1.25, opacity: 1, duration: 0.2, ease: 'power4.out' }, 0.5)
  tl.to(D, { scale: 1, duration: 0.3 }, 0.7)
  tl.to(D, { boxShadow: '0 0 20px 6px rgba(200,182,255,0.7), 0 0 40px 12px rgba(200,182,255,0.3)', duration: 0.3 }, 0.5)

  tl.to(O, { scale: 1.25, opacity: 1, duration: 0.2, ease: 'power4.out' }, 0.85)
  tl.to(O, { scale: 1, duration: 0.3 }, 1.05)
  tl.to(O, { boxShadow: '0 0 20px 6px rgba(184,224,210,0.7), 0 0 40px 12px rgba(184,224,210,0.3)', duration: 0.3 }, 0.85)

  tl.to(T, { scale: 1.25, opacity: 1, duration: 0.2, ease: 'power4.out' }, 1.2)
  tl.to(T, { scale: 1, duration: 0.3 }, 1.4)
  tl.to(T, { boxShadow: '0 0 20px 6px rgba(255,205,178,0.7), 0 0 40px 12px rgba(255,205,178,0.3)', duration: 0.3 }, 1.2)

  tl.to('#wordmark', { opacity: 1, duration: 0.3 }, 1.5)
  tl.to('#brandName', { opacity: 1, scale: 1, duration: 0.5, ease: 'power2.inOut' }, 1.6)

  const subSpans = [...document.querySelectorAll('.brand-sub span')]
  subSpans.forEach((s, i) => { tl.to(s, { opacity: 1, duration: 0.2 }, 2.2 + i * 0.09) })

  tl.to('#tagline', { opacity: 1, duration: 0.5 }, 3.0)
  tl.to([D, O, T], { scale: 1.15, duration: 0.4, ease: 'power1.inOut', stagger: 0.05, yoyo: true, repeat: 1 }, 3.5)
  tl.to('#replay', { opacity: 1, duration: 0.4 }, 5.0)
}

// ─────────────────────────────────────────────
//  VERSION 2 — ORBIT
// ─────────────────────────────────────────────
function runV2() {
  document.querySelectorAll('.orbit-ring').forEach(el => el.style.display = 'block')

  gsap.set(dotsAll, { scale: 0, rotation: 180, opacity: 0 })
  gsap.set('#wordmark', { opacity: 0, y: 16 })
  gsap.set('#brandName', { opacity: 0, scale: 1 })

  const tl = gsap.timeline({ defaults: { ease: 'back.out(1.4)' } })

  tl.to('#ring1', { scale: 1, opacity: 1, borderColor: 'rgba(200,182,255,0.12)', duration: 0.6, ease: 'power2.out' }, 0)
  tl.to('#ring2', { scale: 1, opacity: 1, borderColor: 'rgba(184,224,210,0.08)', duration: 0.8, ease: 'power2.out' }, 0.1)

  tl.to(ghosts, { opacity: 1, scale: 1, rotation: 0, duration: 0.4, stagger: 0.06 }, 0.2)

  tl.fromTo(D, { scale: 0, rotation: -90, opacity: 0 }, { scale: 1.3, rotation: 0, opacity: 1, duration: 0.3, ease: 'back.out(2)' }, 0.7)
  tl.to(D, { scale: 1, duration: 0.2 }, 1.0)
  tl.to(D, { boxShadow: '0 0 24px 8px rgba(200,182,255,0.6)', duration: 0.4 }, 0.9)

  tl.fromTo(O, { scale: 0, rotation: -90, opacity: 0 }, { scale: 1.3, rotation: 0, opacity: 1, duration: 0.3, ease: 'back.out(2)' }, 1.1)
  tl.to(O, { scale: 1, duration: 0.2 }, 1.4)
  tl.to(O, { boxShadow: '0 0 24px 8px rgba(184,224,210,0.6)', duration: 0.4 }, 1.3)

  tl.fromTo(T, { scale: 0, rotation: -90, opacity: 0 }, { scale: 1.3, rotation: 0, opacity: 1, duration: 0.3, ease: 'back.out(2)' }, 1.5)
  tl.to(T, { scale: 1, duration: 0.2 }, 1.8)
  tl.to(T, { boxShadow: '0 0 24px 8px rgba(255,205,178,0.6)', duration: 0.4 }, 1.7)

  tl.to('#ring1,#ring2', { scale: 1.3, opacity: 0, duration: 0.6, ease: 'power2.in' }, 1.9)

  tl.to('#wordmark', { opacity: 1, y: 0, duration: 0.5, ease: 'power3.out' }, 2.0)
  tl.to('#brandName', { opacity: 1, duration: 0.55 }, 2.1)

  const subSpans = [...document.querySelectorAll('.brand-sub span')]
  subSpans.forEach((s, i) => { tl.to(s, { opacity: 1, duration: 0.2 }, 2.6 + i * 0.08) })

  tl.to('#tagline', { opacity: 1, duration: 0.5 }, 3.2)
  tl.to([D, O, T], { scale: 1.12, duration: 0.3, yoyo: true, repeat: 1, stagger: 0.07 }, 3.8)
  tl.to('#replay', { opacity: 1, duration: 0.4 }, 5.0)
}

// ─────────────────────────────────────────────
//  VERSION 3 — SCAN
// ─────────────────────────────────────────────
function runV3() {
  document.getElementById('scanline').style.display = 'block'
  document.getElementById('glowBg').style.display = 'block'
  document.querySelectorAll('.bracket').forEach(el => el.style.display = 'block')
  document.getElementById('divider').style.display = 'block'

  // v3 uses char-by-char for brandName
  gsap.set('#brandName', { opacity: 1, scale: 1 })
  gsap.set(dotsAll, { opacity: 0, scale: 0.6 })

  const W = window.innerWidth
  const tl = gsap.timeline()

  tl.to('#glowBg', { opacity: 1, duration: 0.8, ease: 'power2.out' }, 0)
  tl.to('.bracket', { opacity: 1, duration: 0.3, stagger: 0.06 }, 0.2)
  tl.to(dotsAll, { opacity: 1, scale: 1, duration: 0.4, stagger: 0.04, ease: 'power2.out' }, 0.4)

  tl.to('#scanline', { opacity: 1, duration: 0.1 }, 0.75)
  tl.to('#scanline', { left: W + 10, duration: 0.55, ease: 'none' }, 0.8)
  tl.to('#scanline', { opacity: 0, duration: 0.1 }, 1.3)

  tl.to(D, { boxShadow: '0 0 20px 6px rgba(200,182,255,0.7)', duration: 0.3 }, 0.9)
  tl.to(O, { boxShadow: '0 0 20px 6px rgba(184,224,210,0.7)', duration: 0.3 }, 1.0)
  tl.to(T, { boxShadow: '0 0 20px 6px rgba(255,205,178,0.7)', duration: 0.3 }, 1.1)

  tl.to('#divider', { width: 120, duration: 0.4, ease: 'power2.inOut' }, 1.35)
  tl.to('#wordmark', { opacity: 1, duration: 0.1 }, 1.5)
  tl.to('.char', { opacity: 1, y: 0, duration: 0.25, stagger: 0.06, ease: 'power3.out' }, 1.55)

  const subSpans = [...document.querySelectorAll('.brand-sub span')]
  subSpans.forEach((s, i) => { tl.to(s, { opacity: 1, y: 0, duration: 0.2 }, 2.1 + i * 0.07) })

  tl.to('#tagline', { opacity: 1, duration: 0.5 }, 2.8)
  tl.to([D, O, T], {
    boxShadow: (i) => {
      const c = ['rgba(200,182,255,0.8)', 'rgba(184,224,210,0.8)', 'rgba(255,205,178,0.8)']
      return `0 0 28px 10px ${c[i]}, 0 0 50px 18px ${c[i].replace('0.8)', '0.3)')}`
    },
    duration: 0.4, yoyo: true, repeat: 1, stagger: 0.08
  }, 3.3)

  tl.to('#scanline', { opacity: 0.3, duration: 0.1 }, 4.0)
  tl.set('#scanline', { left: W + 10 }, 4.0)
  tl.to('#scanline', { left: -10, duration: 0.5, ease: 'none', opacity: 0 }, 4.0)

  tl.to('#replay', { opacity: 1, duration: 0.4 }, 4.8)
}

// ─────────────────────────────────────────────
//  VERSION 4 — GALAXY BURST (canvas particles)
// ─────────────────────────────────────────────
const canvas = document.getElementById('galaxy')
const ctx = canvas.getContext('2d')
let galaxyParticles = []
let galaxyAnimId = null
let galaxyPhase = 'idle'
let ambientInterval = null

function resizeCanvas() {
  canvas.width = window.innerWidth
  canvas.height = window.innerHeight
}
resizeCanvas()
window.addEventListener('resize', resizeCanvas)

const PCOLORS = ['#C8B6FF','#B8E0D2','#FFCDB2','#A2D2FF','rgba(255,255,255,0.8)']

function createParticle(x, y, burst = false) {
  const angle = Math.random() * Math.PI * 2
  const speed = burst ? (Math.random() * 3 + 1) : (Math.random() * 0.4 + 0.05)
  return {
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    r: burst ? (Math.random() * 2 + 0.5) : (Math.random() * 1.5 + 0.3),
    alpha: burst ? (Math.random() * 0.8 + 0.2) : (Math.random() * 0.5 + 0.1),
    decay: burst ? (Math.random() * 0.015 + 0.008) : 0,
    color: PCOLORS[Math.floor(Math.random() * PCOLORS.length)],
    life: 1
  }
}

function spawnBurst(count = 120) {
  const cx = canvas.width / 2, cy = canvas.height / 2
  for (let i = 0; i < count; i++) galaxyParticles.push(createParticle(cx, cy, true))
}

function spawnAmbient() {
  if (galaxyPhase !== 'idle') return
  const cx = canvas.width / 2, cy = canvas.height / 2
  for (let i = 0; i < 2; i++) {
    galaxyParticles.push(createParticle(
      cx + (Math.random() - 0.5) * 160,
      cy + (Math.random() - 0.5) * 160,
      false
    ))
  }
}

function drawGalaxyParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height)
  galaxyParticles = galaxyParticles.filter(p => p.alpha > 0.01)
  for (const p of galaxyParticles) {
    ctx.globalAlpha = Math.max(0, p.alpha)
    ctx.fillStyle = p.color
    ctx.beginPath()
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2)
    ctx.fill()
    p.x += p.vx; p.y += p.vy
    p.vy += 0.01
    p.alpha -= p.decay
    if (!p.decay) p.alpha -= 0.001
  }
  ctx.globalAlpha = 1
  galaxyAnimId = requestAnimationFrame(drawGalaxyParticles)
}

function addRipple(dot, color) {
  const ripple = document.createElement('div')
  ripple.style.cssText = `position:fixed;pointer-events:none;border-radius:50%;border:1px solid ${color};opacity:0.8;z-index:5;`
  const rect = dot.getBoundingClientRect()
  const size = rect.width
  ripple.style.width = ripple.style.height = size + 'px'
  ripple.style.left = rect.left + 'px'
  ripple.style.top = rect.top + 'px'
  document.body.appendChild(ripple)
  gsap.to(ripple, {
    width: size * 4, height: size * 4,
    left: rect.left - size * 1.5, top: rect.top - size * 1.5,
    opacity: 0, duration: 0.8, ease: 'power2.out',
    onComplete: () => ripple.remove()
  })
}

function runV4() {
  document.getElementById('galaxy').style.display = 'block'
  galaxyPhase = 'idle'

  gsap.set('#brandName', { opacity: 0, scale: 0.9 })

  ambientInterval = setInterval(spawnAmbient, 80)
  drawGalaxyParticles()

  const tl = gsap.timeline()

  tl.to(ghosts, { opacity: 1, scale: 1, duration: 0.5, stagger: { amount: 0.3, from: 'center' }, ease: 'back.out(1.5)' }, 0.4)

  tl.call(() => { spawnBurst(80); addRipple(D, '#C8B6FF') }, [], 0.9)
  tl.to(D, { opacity: 1, scale: 1.4, duration: 0.15, ease: 'power4.out' }, 0.9)
  tl.to(D, { scale: 1, duration: 0.3, ease: 'elastic.out(1,0.5)' }, 1.05)
  tl.to(D, { boxShadow: '0 0 24px 8px rgba(200,182,255,0.7)', duration: 0.4 }, 1.0)

  tl.call(() => { spawnBurst(70); addRipple(O, '#B8E0D2') }, [], 1.2)
  tl.to(O, { opacity: 1, scale: 1.4, duration: 0.15, ease: 'power4.out' }, 1.2)
  tl.to(O, { scale: 1, duration: 0.3, ease: 'elastic.out(1,0.5)' }, 1.35)
  tl.to(O, { boxShadow: '0 0 24px 8px rgba(184,224,210,0.7)', duration: 0.4 }, 1.3)

  tl.call(() => { spawnBurst(70); addRipple(T, '#FFCDB2') }, [], 1.5)
  tl.to(T, { opacity: 1, scale: 1.4, duration: 0.15, ease: 'power4.out' }, 1.5)
  tl.to(T, { scale: 1, duration: 0.3, ease: 'elastic.out(1,0.5)' }, 1.65)
  tl.to(T, { boxShadow: '0 0 24px 8px rgba(255,205,178,0.7)', duration: 0.4 }, 1.6)

  tl.call(() => spawnBurst(200), [], 1.85)
  tl.call(() => { clearInterval(ambientInterval); galaxyPhase = 'hold' }, [], 2.0)

  tl.to('#wordmark', { opacity: 1, duration: 0.1 }, 2.0)
  tl.to('#brandName', { opacity: 1, scale: 1, duration: 0.5, ease: 'power3.out' }, 2.0)

  const subSpans = [...document.querySelectorAll('.brand-sub span')]
  subSpans.forEach((s, i) => { tl.to(s, { opacity: 1, duration: 0.15 }, 2.4 + i * 0.08) })

  tl.to('#tagline', { opacity: 1, duration: 0.5 }, 3.0)
  tl.call(() => spawnBurst(50), [], 3.5)
  tl.to([D, O, T], { scale: 1.2, duration: 0.25, yoyo: true, repeat: 1, stagger: 0.07 }, 3.5)
  tl.to('#replay', { opacity: 1, duration: 0.4 }, 5.0)
}

// ─────────────────────────────────────────────
//  VERSION 5 — CONSTELLATION
//  Dots scatter offscreen, fly in from random
//  positions and snap into grid. Lines connect
//  them briefly before wordmark reveals.
// ─────────────────────────────────────────────
function runV5() {
  // Place dots randomly around the screen, then snap to grid
  const W = window.innerWidth, H = window.innerHeight
  const cx = W / 2, cy = H / 2

  dotsAll.forEach(dot => {
    const rx = (Math.random() - 0.5) * W * 0.8
    const ry = (Math.random() - 0.5) * H * 0.8
    gsap.set(dot, { opacity: 0, scale: 0.4, x: rx, y: ry })
  })
  gsap.set('#brandName', { opacity: 0, scale: 0.9 })

  // Draw constellation lines on a canvas overlay
  const overlay = document.createElement('canvas')
  overlay.style.cssText = 'position:fixed;inset:0;z-index:3;pointer-events:none'
  overlay.width = W; overlay.height = H
  document.body.appendChild(overlay)
  const octx = overlay.getContext('2d')

  const tl = gsap.timeline()

  // 0.0–0.6: Stars blink in at random positions
  tl.to(dotsAll, {
    opacity: 1, scale: 1, duration: 0.25,
    stagger: { amount: 0.5, from: 'random' },
    ease: 'power2.out'
  }, 0)

  // 0.8: constellation lines draw between colored dots
  tl.call(() => {
    const positions = [D, O, T].map(el => {
      const r = el.getBoundingClientRect()
      return { x: r.left + r.width/2 + (Math.random()-0.5)*W*0.3, y: r.top + r.height/2 + (Math.random()-0.5)*H*0.3 }
    })
    let prog = 0
    const lineAnim = setInterval(() => {
      octx.clearRect(0, 0, W, H)
      prog = Math.min(prog + 0.04, 1)
      octx.strokeStyle = 'rgba(200,182,255,0.3)'
      octx.lineWidth = 0.8
      for (let i = 0; i < positions.length - 1; i++) {
        const a = positions[i], b = positions[i+1]
        octx.beginPath()
        octx.moveTo(a.x, a.y)
        octx.lineTo(a.x + (b.x - a.x) * prog, a.y + (b.y - a.y) * prog)
        octx.stroke()
      }
      if (prog >= 1) clearInterval(lineAnim)
    }, 16)
    setTimeout(() => { octx.clearRect(0, 0, W, H) }, 1200)
  }, [], 0.8)

  // 1.2: All dots snap to grid positions (x:0 y:0)
  tl.to(dotsAll, {
    x: 0, y: 0, duration: 0.6,
    stagger: { amount: 0.25, from: 'random' },
    ease: 'back.out(1.8)'
  }, 1.2)

  // 1.6: Colored dots light up
  tl.to(D, { scale: 1.3, boxShadow: '0 0 24px 8px rgba(200,182,255,0.7)', duration: 0.3, ease: 'power4.out' }, 1.8)
  tl.to(D, { scale: 1, duration: 0.25 }, 2.1)
  tl.to(O, { scale: 1.3, boxShadow: '0 0 24px 8px rgba(184,224,210,0.7)', duration: 0.3, ease: 'power4.out' }, 1.95)
  tl.to(O, { scale: 1, duration: 0.25 }, 2.25)
  tl.to(T, { scale: 1.3, boxShadow: '0 0 24px 8px rgba(255,205,178,0.7)', duration: 0.3, ease: 'power4.out' }, 2.1)
  tl.to(T, { scale: 1, duration: 0.25 }, 2.4)

  // 2.3: Wordmark
  tl.to('#wordmark', { opacity: 1, duration: 0.1 }, 2.3)
  tl.to('#brandName', { opacity: 1, scale: 1, duration: 0.5, ease: 'power3.out' }, 2.3)
  const subSpans = [...document.querySelectorAll('.brand-sub span')]
  subSpans.forEach((s, i) => { tl.to(s, { opacity: 1, duration: 0.15 }, 2.8 + i * 0.08) })
  tl.to('#tagline', { opacity: 1, duration: 0.5 }, 3.5)

  // Cleanup overlay
  tl.call(() => overlay.remove(), [], 2.2)

  // Gentle pulse
  tl.to([D, O, T], { scale: 1.15, duration: 0.3, yoyo: true, repeat: 1, stagger: 0.07 }, 4.0)
  tl.to('#replay', { opacity: 1, duration: 0.4 }, 5.0)
}

// ─────────────────────────────────────────────
//  VERSION 6 — GLITCH BOOT
//  Logo appears corrupted — random offsets,
//  color noise — then hard-cuts to clean state.
// ─────────────────────────────────────────────
function runV6() {
  gsap.set(dotsAll, { opacity: 0, scale: 0 })
  gsap.set('#brandName', { opacity: 0 })

  // Glitch canvas
  const gc = document.createElement('canvas')
  gc.style.cssText = 'position:fixed;inset:0;z-index:3;pointer-events:none'
  gc.width = window.innerWidth; gc.height = window.innerHeight
  document.body.appendChild(gc)
  const gctx = gc.getContext('2d')

  // Draw random noise bars (glitch effect)
  let glitchTimer = null
  function drawGlitch(intensity = 1) {
    gctx.clearRect(0, 0, gc.width, gc.height)
    const bars = Math.floor(4 * intensity)
    for (let i = 0; i < bars; i++) {
      const y = Math.random() * gc.height
      const h = Math.random() * 4 + 1
      const x = (Math.random() - 0.5) * 60 * intensity
      const colors = ['rgba(200,182,255,0.4)', 'rgba(184,224,210,0.4)', 'rgba(255,205,178,0.3)']
      gctx.fillStyle = colors[i % colors.length]
      gctx.fillRect(x, y, gc.width, h)
    }
  }

  const tl = gsap.timeline()

  // 0.0: Grid appears instantly but glitchy
  tl.call(() => {
    gsap.set(dotsAll, { opacity: 1, scale: 1 })
    glitchTimer = setInterval(() => drawGlitch(1), 60)
    // Apply random offsets to all dots to simulate corruption
    dotsAll.forEach(dot => {
      gsap.set(dot, {
        x: (Math.random()-0.5)*24,
        y: (Math.random()-0.5)*24,
        filter: `hue-rotate(${Math.random()*180}deg)`
      })
    })
  }, [], 0.1)

  // 0.1–0.9: Rapid glitch flickers — dots shift around
  for (let i = 0; i < 5; i++) {
    tl.call(() => {
      dotsAll.forEach(dot => {
        gsap.to(dot, {
          x: (Math.random()-0.5)*30,
          y: (Math.random()-0.5)*30,
          duration: 0.08,
          ease: 'none'
        })
      })
    }, [], 0.1 + i * 0.15)
  }

  // 1.0: HARD CUT — everything snaps clean
  tl.call(() => {
    clearInterval(glitchTimer)
    gctx.clearRect(0, 0, gc.width, gc.height)
    gsap.to(dotsAll, { x: 0, y: 0, filter: 'hue-rotate(0deg)', duration: 0.05, ease: 'none' })
  }, [], 1.0)

  // Brief clean flash
  tl.call(() => {
    gctx.fillStyle = 'rgba(255,255,255,0.08)'
    gctx.fillRect(0, 0, gc.width, gc.height)
    setTimeout(() => gctx.clearRect(0, 0, gc.width, gc.height), 80)
  }, [], 1.0)

  // 1.1: Colored dots glow in clean, precise sequence
  tl.to(D, { boxShadow: '0 0 24px 8px rgba(200,182,255,0.8)', duration: 0.2 }, 1.1)
  tl.to(O, { boxShadow: '0 0 24px 8px rgba(184,224,210,0.8)', duration: 0.2 }, 1.3)
  tl.to(T, { boxShadow: '0 0 24px 8px rgba(255,205,178,0.8)', duration: 0.2 }, 1.5)

  // 1 more glitch ripple before wordmark
  tl.call(() => {
    drawGlitch(0.4)
    setTimeout(() => gctx.clearRect(0, 0, gc.width, gc.height), 120)
  }, [], 1.7)

  // 1.9: Wordmark types in
  tl.to('#wordmark', { opacity: 1, duration: 0.05 }, 1.9)
  tl.to('#brandName', { opacity: 1, duration: 0.1 }, 1.9)

  // Typewriter effect on brand-sub letters
  const subSpans = [...document.querySelectorAll('.brand-sub span')]
  subSpans.forEach((s, i) => {
    tl.call(() => {
      // Glitch each letter before settling
      gsap.fromTo(s, { opacity: 0, x: (Math.random()-0.5)*8 }, { opacity: 1, x: 0, duration: 0.12 })
    }, [], 2.0 + i * 0.1)
  })

  tl.to('#tagline', { opacity: 1, duration: 0.4 }, 3.0)

  // Final micro-glitch on dots
  tl.call(() => {
    dotsAll.forEach(dot => {
      gsap.to(dot, { x: (Math.random()-0.5)*3, y: (Math.random()-0.5)*3, duration: 0.06, yoyo: true, repeat: 3, ease: 'none' })
    })
  }, [], 3.5)

  tl.call(() => gc.remove(), [], 3.8)
  tl.to([D, O, T], { scale: 1.1, duration: 0.2, yoyo: true, repeat: 1, stagger: 0.06 }, 3.6)
  tl.to('#replay', { opacity: 1, duration: 0.4 }, 5.0)
}

// ─────────────────────────────────────────────
//  RUNNER — pick random version
// ─────────────────────────────────────────────
const runners = [runV1, runV2, runV3, runV4, runV5, runV6]

function run(forceVersion = -1) {
  resetAll()

  let v = forceVersion >= 0 ? forceVersion : Math.floor(Math.random() * runners.length)
  // Avoid same version twice in a row on replay
  if (forceVersion < 0 && v === currentVersion && runners.length > 1) {
    v = (v + 1 + Math.floor(Math.random() * (runners.length - 1))) % runners.length
  }
  currentVersion = v

  document.getElementById('version-badge').textContent = `v${v + 1} · ${NAMES[v]}`
  runners[v]()
}

// ─────────────────────────────────────────────
//  REPLAY
// ─────────────────────────────────────────────
document.getElementById('replay').addEventListener('click', () => {
  gsap.to('#replay', { opacity: 0, duration: 0.15, onComplete: () => setTimeout(run, 250) })
  // Remove any lingering DOM ripples
  document.querySelectorAll('div[style*="position:fixed"]').forEach(el => {
    if (!['replay','version-badge'].includes(el.id)) el.remove()
  })
})

// ─────────────────────────────────────────────
//  AUTO-PLAY
// ─────────────────────────────────────────────
run()
</script>
