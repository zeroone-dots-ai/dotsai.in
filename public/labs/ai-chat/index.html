<style>
:root {
  --hero: #06060a;
  --plum: #43305f;
  --plum-deep: #241d33;
  --lavender: #d7cff0;
  --mint: #c9ded4;
  --peach: #f1c6ae;
  --sky: #bfd6ec;
  --paper: #f7f3ed;
  --ink: #171722;
  --smoke: #6e675f;
  --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
  --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--hero);
  color: #e8e4ef;
  font-family: 'DM Sans', sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Topbar */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
  background: rgba(6, 6, 10, 0.85);
  border-bottom: 1px solid rgba(215, 207, 240, 0.08);
}
.topbar-inner {
  max-width: 1120px;
  width: calc(100% - 32px);
  height: 64px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.brand-lockup {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: inherit;
}
.brand-word {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(215, 207, 240, 0.7);
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 20px;
}
.nav-links a {
  font-size: 13px;
  color: rgba(215, 207, 240, 0.5);
  text-decoration: none;
  transition: color 200ms var(--ease-out);
}
.nav-links a:hover { color: var(--lavender); }
.nav-links a.active { color: var(--lavender); }

/* Demo banner */
.demo-banner {
  background: linear-gradient(90deg, var(--plum-deep), rgba(67, 48, 95, 0.6));
  text-align: center;
  padding: 10px 16px;
  font-size: 13px;
  color: rgba(215, 207, 240, 0.8);
  border-bottom: 1px solid rgba(215, 207, 240, 0.06);
}
.demo-banner a {
  color: var(--mint);
  text-decoration: underline;
  text-underline-offset: 2px;
}

/* Chat container */
.chat-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 0;
}
.chat-window {
  width: 100%;
  max-width: 640px;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.chat-header {
  text-align: center;
  padding: 24px 0 16px;
}
.chat-header h1 {
  font-family: 'Instrument Serif', serif;
  font-size: 28px;
  font-weight: 400;
  color: var(--lavender);
  margin-bottom: 6px;
}
.chat-header p {
  font-size: 13px;
  color: rgba(215, 207, 240, 0.45);
}

/* Messages area */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scrollbar-width: thin;
  scrollbar-color: rgba(215,207,240,0.15) transparent;
}

.msg {
  max-width: 85%;
  padding: 14px 18px;
  border-radius: 16px;
  font-size: 14.5px;
  line-height: 1.6;
  opacity: 0;
  transform: translateY(8px);
  animation: msgIn 400ms var(--ease-out) forwards;
}

.msg-user {
  align-self: flex-end;
  background: var(--plum);
  color: var(--lavender);
  border-bottom-right-radius: 4px;
}

.msg-ai {
  align-self: flex-start;
  background: rgba(215, 207, 240, 0.08);
  border: 1px solid rgba(215, 207, 240, 0.1);
  border-bottom-left-radius: 4px;
  backdrop-filter: blur(12px);
}

.msg-ai .msg-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--mint);
  margin-bottom: 6px;
  display: block;
}

/* Typing indicator */
.typing {
  display: flex;
  gap: 5px;
  padding: 14px 18px;
  align-self: flex-start;
  background: rgba(215, 207, 240, 0.08);
  border: 1px solid rgba(215, 207, 240, 0.1);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
}
.typing-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--lavender);
  opacity: 0.4;
  animation: bounce 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.15s; }
.typing-dot:nth-child(3) { animation-delay: 0.3s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

@keyframes msgIn {
  to { opacity: 1; transform: translateY(0); }
}

/* Input bar */
.input-bar {
  width: 100%;
  max-width: 640px;
  padding: 16px 0 24px;
}
.input-row {
  display: flex;
  gap: 10px;
  align-items: center;
}
.input-row input {
  flex: 1;
  background: rgba(215, 207, 240, 0.06);
  border: 1px solid rgba(215, 207, 240, 0.12);
  border-radius: 12px;
  padding: 14px 18px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14.5px;
  color: #e8e4ef;
  outline: none;
  transition: border-color 200ms var(--ease-out), box-shadow 200ms var(--ease-out);
}
.input-row input::placeholder { color: rgba(215, 207, 240, 0.3); }
.input-row input:focus {
  border-color: rgba(215, 207, 240, 0.3);
  box-shadow: 0 0 20px rgba(215, 207, 240, 0.08);
}
.send-btn {
  width: 48px;
  height: 48px;
  border: none;
  border-radius: 12px;
  background: var(--plum);
  color: var(--lavender);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 160ms var(--ease-out), background 200ms var(--ease-out);
  flex-shrink: 0;
}
.send-btn:active { transform: scale(0.97); }
.send-btn:hover { background: #503b70; }

/* Footer */
.page-footer {
  text-align: center;
  padding: 24px 16px;
  border-top: 1px solid rgba(215, 207, 240, 0.06);
}
.page-footer a {
  color: var(--lavender);
  text-decoration: none;
  font-size: 13px;
  opacity: 0.6;
  transition: opacity 200ms var(--ease-out);
}
.page-footer a:hover { opacity: 1; }
.page-footer .copy {
  font-size: 11px;
  color: rgba(215, 207, 240, 0.3);
  margin-top: 8px;
  font-family: 'Space Mono', monospace;
}

/* Responsive */
@media (max-width: 600px) {
  .nav-links { display: none; }
  .chat-header h1 { font-size: 22px; }
  .msg { max-width: 92%; font-size: 14px; }
}
</style>

<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="/" class="brand-lockup">
      <span class="brand-word">ZeroOne D.O.T.S AI</span>
    </a>
    <nav class="nav-links">
      <a href="/">Home</a>
      <a href="/labs/" class="active">Labs</a>
      <a href="https://wa.me/918320065658" target="_blank" rel="noopener">Contact</a>
    </nav>
  </div>
</header>

<div class="demo-banner">
  This is a demo. For real conversations, <a href="https://wa.me/918320065658" target="_blank" rel="noopener">WhatsApp us</a>
</div>

<div class="chat-wrap">
  <div class="chat-window">
    <div class="chat-header">
      <h1>AI Chat Agent</h1>
      <p>See how a custom ZeroOne AI assistant handles business queries</p>
    </div>
    <div class="messages" id="messages"></div>
  </div>
  <div class="input-bar">
    <div class="input-row">
      <input type="text" id="user-input" placeholder="Ask about AI automation, private AI, or SEO..." autocomplete="off">
      <button class="send-btn" id="send-btn" aria-label="Send message">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<footer class="page-footer">
  <a href="/labs/">&#8592; Back to Labs</a>
  <div class="copy">&copy; 2026 ZeroOne D.O.T.S AI</div>
</footer>

<script>
(function() {
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  const preloaded = [
    { role: 'user', text: 'What can ZeroOne build for my business?' },
    { role: 'ai', text: 'I can help with:\n\n<strong>Private AI deployment</strong> on your own servers\n<strong>AI automation</strong> for document processing & workflows\n<strong>Custom agents</strong> for your team\'s specific needs\n<strong>SEO & GEO optimization</strong> for AI search engines\n\nWhat interests you most?', delay: 1200 },
    { role: 'user', text: 'Tell me about private AI', delay: 2000 },
    { role: 'ai', text: 'Private AI means your language models, data pipelines, and agents run on <strong>infrastructure you control</strong> \u2014 your VPS, your cloud, your on-prem servers.\n\nNo data leaves your network. No vendor lock-in. You own the models, the weights, and every output.\n\nWe handle the full stack: model selection, fine-tuning, RAG setup, API layer, and monitoring. Most deployments go live in <strong>under 2 weeks</strong>.', delay: 1800 }
  ];

  const responses = {
    'automation': 'We build AI automation systems that handle repetitive work: document triage, email classification, invoice extraction, CRM updates. Most clients see <strong>60-80% time savings</strong> on manual processes within the first month.',
    'seo': 'Our GEO (Generative Engine Optimization) service ensures your brand appears in AI search results \u2014 ChatGPT, Perplexity, Google AI Overviews. Traditional SEO alone won\'t cut it anymore. We optimize for both.',
    'cost': 'Pricing depends on scope. A typical private AI deployment starts around <strong>\u20b92-5L</strong> for initial setup. Automation projects start at <strong>\u20b91L</strong>. Everything is custom-built, no generic templates.',
    'agent': 'Custom AI agents act as digital team members. They can handle customer queries, process documents, generate reports, and integrate with your existing tools \u2014 Slack, CRM, ERP, whatever you use.',
    'private': 'Your data stays on your servers. We deploy open-source models (Llama, Mistral, Qwen) fine-tuned to your domain. Full API access, monitoring dashboard, and ongoing optimization included.',
    'web': 'We build AI-native web experiences \u2014 sites that feel alive. Dynamic content, intelligent search, personalized journeys. Not template websites with a chatbot bolted on.',
    'meet': 'ZeroOne D.O.T.S AI is founded by Meet Deshani. One person, no hand-offs to juniors, direct implementation. Every project gets the same level of craft and attention.',
    'default': 'Great question! ZeroOne D.O.T.S AI specializes in private AI deployment, automation systems, custom agents, and GEO optimization. Want me to dive deeper into any of these?'
  };

  function addMessage(role, html, animate) {
    const div = document.createElement('div');
    div.className = 'msg msg-' + role;
    if (animate !== false) {
      div.style.animationDelay = '0ms';
    } else {
      div.style.opacity = '1';
      div.style.transform = 'none';
    }
    if (role === 'ai') {
      div.innerHTML = '<span class="msg-label">ZeroOne AI</span>' + html;
    } else {
      div.textContent = html;
    }
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing-indicator';
    div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function matchResponse(input) {
    const lower = input.toLowerCase();
    for (const [key, val] of Object.entries(responses)) {
      if (key !== 'default' && lower.includes(key)) return val;
    }
    if (lower.includes('price') || lower.includes('how much')) return responses.cost;
    if (lower.includes('who') || lower.includes('founder')) return responses.meet;
    if (lower.includes('website') || lower.includes('web')) return responses.web;
    return responses.default;
  }

  function handleSend() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    addMessage('user', text);
    showTyping();
    const delay = 800 + Math.random() * 800;
    setTimeout(function() {
      hideTyping();
      addMessage('ai', matchResponse(text));
    }, delay);
  }

  sendBtn.addEventListener('click', handleSend);
  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSend();
  });

  // Play preloaded conversation
  let offset = 600;
  preloaded.forEach(function(msg, i) {
    const d = msg.delay || 0;
    offset += d;
    if (msg.role === 'ai') {
      const typingStart = offset - 800;
      setTimeout(showTyping, typingStart > 0 ? typingStart : 0);
      setTimeout(function() {
        hideTyping();
        addMessage(msg.role, msg.text);
      }, offset);
    } else {
      setTimeout(function() { addMessage(msg.role, msg.text); }, offset);
    }
    offset += 600;
  });
})();
</script>
