server {
    listen 443 ssl;
    server_name dotsai.in;

    ssl_certificate /etc/letsencrypt/live/dotsai.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dotsai.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /usr/share/nginx/html/dotsai.in;
    index index.html;

    gzip on;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Static assets — immutable cache (1 year)
    location ~* \.(svg|png|jpg|jpeg|webp|gif|ico|woff2?|ttf|eot|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept-Encoding";
        try_files $uri =404;
    }

    location = /robots.txt { try_files $uri =404; }
    location = /sitemap.xml { try_files $uri =404; }
    location = /llms.txt { try_files $uri =404; }

    location / {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        try_files $uri $uri/ $uri/index.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
