server {
    listen 443 ssl;
    server_name dotsai.in;
    root /usr/share/nginx/html/dotsai.in;
    index index.html;

    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location = /robots.txt { try_files $uri =404; }
    location = /sitemap.xml { try_files $uri =404; }
    location = /llms.txt { try_files $uri =404; }
    location = /favicon.svg { try_files $uri =404; }
    location = /og-image.png { try_files $uri =404; }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
